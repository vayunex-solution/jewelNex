# .cpanel.yml
# cPanel deployment configuration file for JewelNex SaaS
# Automatically deploys frontend build and backend code to their respective subdomains.

---
deployment:
  tasks:
    - /bin/cp -Rf JewelNex_SaaS/backend/. /home/vayunexs/api.jewelnex.vayunexsolution.com/
    - /bin/cp -Rf JewelNex_SaaS/frontend/dist/. /home/vayunexs/app.jewelnex.vayunexsolution.com/
